global:
  scrape_interval: 15s
  evaluation_interval: 15s

  external_labels:
    project: "layananbuku"
    env: "production"

scrape_configs:
  - job_name: "prometheus"
    static_configs:
      - targets: ["localhost:9090"]

  - job_name: "node-exporter"
    dns_sd_configs:
      - names:
          - "tasks.node-exporter"
        type: "A"
        port: 9100

  - job_name: "cadvisor"
    dns_sd_configs:
      - names:
          - "tasks.cadvisor"
        type: "A"
        port: 8080

  - job_name: "django"
    metrics_path: "/metrics"
    dns_sd_configs:
      - names:
          - "tasks.backend-django"
        type: "A"
        port: 8000

  - job_name: "minio"
    metrics_path: "/minio/v2/metrics/cluster"
    dns_sd_configs:
      - names:
          - "tasks.storage-minio"
        type: "A"
        port: 9000
