global:
  scrape_interval: 15s
  evaluation_interval: 15s

  external_labels:
    project: 'layananbuku'
    env: 'production'

scrape_configs:

  - job_name: "prometheus"
    static_configs:
      - targets: ["localhost:9090"]

  - job_name: "node-exporter"
    static_configs:
      - targets: ["node-exporter:9100"]

  - job_name: "cadvisor"
    static_configs:
      - targets: ["cadvisor:8080"]

  - job_name: "django"
    static_configs:
      - targets: ["backend-django:8000"]
    metrics_path: "/metrics"

  - job_name: "minio"
    static_configs:
      - targets: ["storage-minio:9000"]
    metrics_path: "/minio/v2/metrics/cluster"  

  

