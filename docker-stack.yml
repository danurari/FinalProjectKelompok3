version: '3.8'

services:
  db:
    image: postgres:15-alpine
    volumes:
      - db_data:/var/lib/postgresql/data
    environment:
      POSTGRES_DB: bookstore_db
      POSTGRES_USER_FILE: /run/secrets/db_user
      POSTGRES_PASSWORD_FILE: /run/secrets/db_password
    secrets:
      - db_user
      - db_password
    networks:
      - bookstore_net

  minio:
    image: minio/minio
    command: server /data --console-address ":9001"
    volumes:
      - minio_data:/data
    environment:
      MINIO_ROOT_USER_FILE: /run/secrets/minio_access_key
      MINIO_ROOT_PASSWORD_FILE: /run/secrets/minio_secret_key
    secrets:
      - minio_access_key
      - minio_secret_key
    ports:
      - "9000:9000"   # Port API MinIO
      - "9001:9001"   # Port Console (Web UI) MinIO
    networks:
      - bookstore_net

  web:
    image: abdurrahmanondocker/bookstorage-django:latest
    # Kita timpa CMD-nya biar dia otomatis nge-migrate database sebelum nyalain server Gunicorn
    command: >
      sh -c "python manage.py migrate && 
             gunicorn bookstorage.wsgi:application --bind 0.0.0.0:8000"
    secrets:
      - db_user
      - db_password
      - minio_access_key
      - minio_secret_key
      - django_secret_key
    environment:
      - DB_HOST=db
      - DB_PORT=5432
      - MINIO_ENDPOINT=http://minio:9000
    ports:
      - "8000:8000"   # Port untuk buka Django dari laptop lu
    networks:
      - bookstore_net

# Deklarasi penyimpanan permanen
volumes:
  db_data:
  minio_data:

# Deklarasi jaringan internal Swarm
networks:
  bookstore_net:
    driver: overlay

# Deklarasi brankas rahasia lu yang udah ada di Swarm
secrets:
  db_user:
    external: true
  db_password:
    external: true
  minio_access_key:
    external: true
  minio_secret_key:
    external: true
  django_secret_key:
    external: true
